# GitHub Pagesへ自動デプロイするワークフロー
name: Deploy to GitHub Pages

# mainブランチへのpush時に実行
on:
  push:
    branches: [main]
  # 手動実行も可能にする
  workflow_dispatch:

# Pagesへのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（後発を優先）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ビルドジョブ
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存パッケージをインストール
        run: npm ci

      - name: 本番ビルド
        run: npm run build

      - name: Pages用に設定
        uses: actions/configure-pages@v5

      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # デプロイジョブ
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
